services:
  db:
    image: postgres:15
    container_name: cnc_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cnc_pipeline
    ports:
      - "5432:5432"
    volumes:
      - cnc_pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cnc_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cnc_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DB_NAME: cnc_pipeline
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]  
      interval: 10s
      timeout: 3s
      retries: 5

  dashboard:
    build: ./dashboard
    container_name: cnc_dashboard
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

  simulator:
    build: ./simulator
    container_name: cnc_simulator
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:5000/api/ingest

volumes:
  cnc_pgdata: